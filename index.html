<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>კედლის პრივიუ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <!-- ═══ CAMERA VIEW (fullscreen on mobile) ══════════════════ -->
  <div class="camera-wrap" id="cameraWrap">
    <video id="cameraFeed" playsinline autoplay muted></video>
    <img  id="frozenImage" alt="" />
    <canvas id="overlayCanvas"></canvas>

    <!-- Shutter (visible only during live feed) -->
    <button class="capture-btn" id="freezeFrameBtn" aria-label="გადაღება">
      <span class="capture-btn__outer"><span class="capture-btn__inner"></span></span>
    </button>

    <!-- Empty placeholder -->
    <div class="camera-empty" id="cameraEmpty">
      <div class="camera-empty__box">
        <div class="camera-empty__icon">📷</div>
        <strong>კამერა ჯერ არ არის ჩართული</strong>
        <span>გახსენი კამერა ქვემოთ მოცემული ღილაკით</span>
      </div>
    </div>

    <!-- Top-left back button (frozen mode only) -->
    <button class="back-btn" id="backBtn" aria-label="უკან">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
  </div>

  <!-- ═══ CONTROL PANEL ════════════════════════════════════════ -->
  <div class="panel" id="controlPanel">

    <!-- Primary actions -->
    <div class="btn-row">
      <button class="btn btn--primary" id="startCameraBtn">
        <svg class="btn__icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="10" cy="10" r="7"/>
          <circle cx="10" cy="10" r="3" fill="currentColor" stroke="none"/>
        </svg>
        კამერა
      </button>

      <label class="btn btn--upload">
        <input type="file" id="textureInput" accept="image/*" />
        <svg class="btn__icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M10 3v9M7 6l3-3 3 3"/>
          <rect x="3" y="14" width="14" height="3" rx="1.5"/>
        </svg>
        ტექსტურა
      </label>

      <button class="btn" id="resetPointsBtn">
        <svg class="btn__icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4.5 10a5.5 5.5 0 1 1 1.4 3.6"/>
          <path d="M4 14.5V10h4.5"/>
        </svg>
        სუფთა
      </button>

      <button class="btn" id="screenshotBtn">
        <svg class="btn__icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="5" width="14" height="11" rx="2"/>
          <circle cx="10" cy="11" r="3"/>
          <path d="M7 5V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/>
        </svg>
        სქრინი
      </button>
    </div>

    <!-- Texture file name -->
    <div class="file-chip" id="textureNameRow" hidden>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="1" width="9" height="13" rx="1.5"/>
        <path d="M11 1v4h4"/>
        <path d="M11 1l4 4"/>
      </svg>
      <span id="textureName"></span>
    </div>

    <!-- Sliders -->
    <div class="sliders">
      <div class="slider-block">
        <div class="slider-header">
          <span class="slider-label">ტექსტურის ზომა</span>
          <div class="slider-value-wrap">
            <input type="number" id="scaleInput" class="slider-num" min="5" max="300" value="100" />
            <span class="slider-unit">%</span>
          </div>
        </div>
        <input type="range" id="scaleRange" class="slider" min="5" max="300" value="100" />
        <div class="slider-tips">
          <span>↙ მცირე (მეტი გამეორება)</span>
          <span>დიდი (ნაკლები) ↗</span>
        </div>
      </div>

      <div class="slider-block">
        <div class="slider-header">
          <span class="slider-label">გამჭვირვალობა</span>
          <div class="slider-value-wrap">
            <input type="number" id="opacityInput" class="slider-num" min="10" max="100" value="85" />
            <span class="slider-unit">%</span>
          </div>
        </div>
        <input type="range" id="opacityRange" class="slider" min="10" max="100" value="85" />
      </div>
    </div>

    <!-- Status -->
    <div class="status">
      <strong id="statusTitle">მზადაა</strong>
      <p id="statusText">გახსენი კამერა, კედელი მოარგე კადრში, დააჭირე მრგვალ ღილაკს, შემდეგ ატვირთე ტექსტურა.</p>
    </div>

  </div><!-- /panel -->

  <script src="./app.js"></script>
  <script>
    // Back button → unfreeze (same as startCameraBtn when frozen)
    document.getElementById("backBtn").addEventListener("click", function () {
      document.getElementById("startCameraBtn").click();
    });
    // Show texture filename
    document.getElementById("textureInput").addEventListener("change", function (e) {
      const row = document.getElementById("textureNameRow");
      const nm  = document.getElementById("textureName");
      if (e.target.files && e.target.files[0]) {
        nm.textContent = e.target.files[0].name;
        row.hidden = false;
      }
    });
  </script>
</body>
</html>
